# Secret hygiene for a PUBLIC repo that now fronts an AI relay (CR-027 §6 /
# FDR-019 W-D4a carry-in): a committed GEMINI_API_KEY (or any credential) must
# be caught in CI, not by luck. Full-history scan on every push and PR.
#
# NOTE: we run the gitleaks CLI BINARY directly, NOT gitleaks/gitleaks-action —
# the wrapper action refuses to run on organization-owned repos (this repo is
# github.com/zaya-platform/zaya-website) without a paid GITLEAKS_LICENSE, so it
# would exit before scanning anything. The CLI is MIT-licensed and has no such
# gate. This mirrors zaya-platform's own security job.
name: secret-scan

on:
  push:
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — a secret in an old commit is still a leak
      - name: Secret scan (gitleaks CLI)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz gitleaks
          # `git` mode scans the full commit history (honours fetch-depth: 0),
          # not just the working tree — a key committed then reverted is caught.
          ./gitleaks git --redact --no-banner --verbose .
