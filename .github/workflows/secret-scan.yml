# Secret hygiene for a PUBLIC repo that now fronts an AI relay (CR-027 §6 /
# FDR-019 W-D4a carry-in): a committed GEMINI_API_KEY (or any credential) must
# be caught in CI, not by luck. Full-history scan on every push and PR.
name: secret-scan

on:
  push:
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — a secret in an old commit is still a leak
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
