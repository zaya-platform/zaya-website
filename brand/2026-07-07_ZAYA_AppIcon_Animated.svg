<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ZAYA animated app icon">
  <title>ZAYA animated app icon</title>
  <desc>The ZAYA location pin with coral Z monogram over teal, with radar-style zone rings pulsing outward to suggest searching nearby.</desc>
  <defs>
    <linearGradient id="zg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13B7B4"/><stop offset="1" stop-color="#0B8B8A"/>
    </linearGradient>
    <clipPath id="zc"><rect width="512" height="512" rx="115"/></clipPath>
    <style>
      .ring{transform-box:view-box;transform-origin:256px 200px;fill:none;stroke:#fff;stroke-width:4;opacity:0;animation:radar 3s linear infinite}
      .r2{animation-delay:1s}.r3{animation-delay:2s}
      @keyframes radar{0%{transform:scale(.12);opacity:0}12%{opacity:.55}100%{transform:scale(1);opacity:0}}
      .dot{transform-box:view-box;transform-origin:256px 200px;animation:pulse 3s ease-in-out infinite}
      @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
      .pin{transform-box:view-box;transform-origin:256px 372px;animation:bob 3s ease-in-out infinite}
      @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
      @media (prefers-reduced-motion:reduce){.ring,.dot,.pin{animation:none}.ring{opacity:.12}}
    </style>
  </defs>
  <g clip-path="url(#zc)">
    <rect width="512" height="512" fill="url(#zg)"/>
    <circle class="ring" cx="256" cy="200" r="288"/>
    <circle class="ring r2" cx="256" cy="200" r="288"/>
    <circle class="ring r3" cx="256" cy="200" r="288"/>
  </g>
  <g class="pin">
    <path d="M333.7 249.2 L256 372 L178.3 249.2 A92 92 0 1 1 333.7 249.2 Z" fill="#fff"/>
    <circle class="dot" cx="256" cy="200" r="56" fill="#FF7A45"/>
    <polyline points="224,180 286,180 226,220 289,220" fill="none" stroke="#fff" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
