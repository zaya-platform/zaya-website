# ZAYA Digital Front Door — Netlify deploy config.
# Static Astro build; no backend. Admin content editing via Sveltia CMS (/admin).

[build]
  # Default (branch / deploy-preview builds): noindex DRAFT — lets you and admin
  # staff test the live build + CMS before go-live, without bypassing anything public.
  command = "npm run build:draft"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ⚑ TEMPORARY (pre-domain phase, 2026-07-08): main deploys the NOINDEX DRAFT build so
# the site can go live on the free *.netlify.app address — accessible/shareable but
# HIDDEN from Google — without needing published=true and without the gate failing.
# The site cannot be indexed while published=false (noindex meta + robots Disallow).
#
# ⚑ RESTORE AT GO-LIVE (once zayaethiopia.com is registered + connected in Netlify):
# switch this back to `npm run build` (the gated F4 build) AND set site.json
# published=true, robots.txt Allow, add the sitemap. See GO-LIVE.md Step 4.
# The gate itself (scripts/check-publish.mjs) is UNCHANGED — this only chooses which
# build command the production context runs during the pre-domain phase.
[context.production]
  command = "npm run build:draft"
  # command = "npm run build"   # ← RESTORE at go-live (re-enables the F4 publish gate)

# The CMS admin UI must never be indexed.
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Sensible security headers for a static marketing site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

# Long-cache the hashed, immutable build assets.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# GitHub OAuth relay for the CMS admin login (Sveltia/Decap-compatible), hosted as
# Netlify Functions on this same site — no Cloudflare, no deprecated Netlify Identity.
[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/auth"
  to = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from = "/callback"
  to = "/.netlify/functions/callback"
  status = 200

# Website AI Assistant relay (CR-027/ADR-024, FDR-019 W-D4a — founder-access
# preview). GEMINI_API_KEY lives ONLY in Netlify env; the curated FAQ/KB/rules
# cascade works fully without it (only the English model-fallback is dark).
[[redirects]]
  from = "/api/assistant"
  to = "/.netlify/functions/assistant"
  status = 200

# Ethiopian flagship domains → 301 to the primary (zayaethiopia.com), so ZAYA keeps
# ONE canonical site while owning the local .et brand. Register zaya.et and/or
# zaya.com.et, add them as secondary domains on this Netlify site (keep
# zayaethiopia.com as PRIMARY), and every path forwards to the primary.
# NOTE: .et registration goes via Ethio Telecom / the .et NIC and must allow pointing
# DNS at Netlify — confirm that before relying on it (see docs/13).
[[redirects]]
  from = "https://zaya.et/*"
  to = "https://zayaethiopia.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.zaya.et/*"
  to = "https://zayaethiopia.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://zaya.com.et/*"
  to = "https://zayaethiopia.com/:splat"
  status = 301
  force = true
